name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Run JVM Tests & Validate Screenshots
    timeout-minutes: 40
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM Tests & Generate Coverage Reports
        run: ./gradlew domain:koverXmlReport composeApp:koverXmlReport

      - name: Upload domain coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          files: domain/build/reports/kover/report.xml
          flags: domain
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload presentation coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          files: composeApp/build/reports/kover/report.xml
          flags: presentation
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Validate Screenshot Tests
        run: ./gradlew androidApp:validateDebugScreenshotTest

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: androidApp/build/reports/screenshotTest/

  android:
    name: Build Android
    needs: test
    timeout-minutes: 40
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Android App
        run: ./gradlew androidApp:assembleDebug

  ios:
    name: Build iOS
    needs: test
    timeout-minutes: 40
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build iOS
        run: |
          cd iosApp
          
          xcrun xcodebuild \
            -scheme "iosApp" \
            -configuration "Debug" \
            -sdk "iphoneos" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            OBJROOT=./build/ios \
            SYMROOT=./build/ios \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty
