name: Build

on: [push, pull_request]

jobs:
  test:
    name: Run JVM Tests & Validate Screenshots
    timeout-minutes: 40
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.0.0

      - name: Run JVM Tests & Generate Coverage Reports
        run: ./gradlew domain:koverXmlReport composeApp:koverXmlReport

      - name: Upload domain coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: domain/build/reports/kover/report.xml
          flags: domain
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload presentation coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: composeApp/build/reports/kover/report.xml
          flags: presentation
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Validate Screenshot Tests
        run: ./gradlew androidApp:validateDebugScreenshotTest

      - name: Upload screenshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: androidApp/build/reports/screenshotTest/

  android:
    name: Build Android
    timeout-minutes: 40
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.0.0
      - name: Build Android App
        run: ./gradlew androidApp:assembleDebug

  ios:
    name: Build iOS
    timeout-minutes: 40
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.0.0

      - name: Build iOS
        run: |
          cd iosApp
          
          xcrun xcodebuild \
            -scheme "iosApp" \
            -configuration "Debug" \
            -sdk "iphoneos" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            OBJROOT=./build/ios \
            SYMROOT=./build/ios \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty
